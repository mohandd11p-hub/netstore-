<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقني ستور</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<style>
*{font-family:'Noto Kufi Arabic',sans-serif;box-sizing:border-box}
body{background:#030304;color:#fff;margin:0}
.g{background:rgba(255,255,255,.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08)}
.gt{background:linear-gradient(135deg,#fff,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bca{background:linear-gradient(135deg,#4F46E5,#6366f1);border:none;color:#fff;padding:8px;border-radius:8px;cursor:pointer}
.bw{background:linear-gradient(135deg,#25D366,#128C7E);position:fixed;bottom:20px;left:20px;z-index:100;width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;text-decoration:none;}
.fi{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:.75rem;padding:10px 16px;color:#fff;width:100%}
.cat-btn{padding:8px 16px;border-radius:10px;font-size:12px;cursor:pointer;background:rgba(255,255,255,.03);color:#94a3b8;border:1px solid rgba(255,255,255,.08)}
.cat-btn.active{background:rgba(99,102,241,.2);color:#fff;}
.card-actions{display:flex;justify-content:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.05)}
.card-actions button{background:rgba(255,255,255,.05);border:none;padding:8px;border-radius:8px;cursor:pointer;color:#94a3b8}
</style>
</head>
<body>

<div id="toasts" style="position:fixed;bottom:20px;right:20px;z-index:9999;"></div>
<a href="https://wa.me/9647819038440" target="_blank" class="bw"><span class="iconify" data-icon="mdi:whatsapp" style="font-size:26px;"></span></a>

<nav style="position:fixed;top:0;left:0;right:0;z-index:200;height:60px;display:flex;align-items:center;padding:0 16px;background:rgba(3,3,4,.88);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05);">
  <div style="max-width:1200px;margin:0 auto;width:100%;display:flex;justify-content:space-between;">
    <div style="font-weight:600;font-size:16px;">تقني ستور</div>
    <div style="display:flex;gap:10px;">
      <button onclick="toggleCart(true)" style="background:none;border:none;cursor:pointer;"><span class="iconify" data-icon="mdi:cart-outline" style="font-size:24px;"></span></button>
      <button onclick="showAdminPage()" style="background:none;border:none;cursor:pointer;"><span class="iconify" data-icon="mdi:cog" style="font-size:24px;"></span></button>
    </div>
  </div>
</nav>

<div id="storePg" style="padding-top:80px;max-width:1200px;margin:0 auto;">
  <input type="text" id="searchInput" oninput="renderProducts()" placeholder="🔍 بحث..." class="fi" style="margin-bottom:20px;">
  <div id="pGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;padding:0 16px;"></div>
</div>

<div id="adminPg" style="display:none;padding-top:80px;max-width:600px;margin:0 auto;padding:20px;">
  <h2 class="gt">لوحة التحكم</h2>
  <button onclick="showStorePage()" style="margin-bottom:20px;">العودة للمتجر</button>
  <div class="g" style="padding:20px;border-radius:14px;">
    <input type="hidden" id="editHid">
    <input type="text" id="fN" placeholder="اسم المنتج" class="fi" style="margin-bottom:10px;">
    <input type="number" id="fP" placeholder="السعر" class="fi" style="margin-bottom:10px;">
    <button onclick="saveProduct()" class="bca" style="width:100%;">حفظ المنتج</button>
  </div>
</div>

<script>
let products = {};
let isAdmin = false; 

function showAdminPage() {
  if (!isAdmin) {
    const password = prompt("أدخل كلمة المرور:");
    if (password === "2211") {
      isAdmin = true;
      renderProducts();
      document.getElementById('storePg').style.display = 'none';
      document.getElementById('adminPg').style.display = 'block';
    } else {
      alert("كلمة سر خاطئة!");
    }
  } else {
    document.getElementById('storePg').style.display = 'none';
    document.getElementById('adminPg').style.display = 'block';
  }
}

function showStorePage() {
  document.getElementById('adminPg').style.display = 'none';
  document.getElementById('storePg').style.display = 'block';
}

// تهيئة Firebase
const firebaseConfig = { databaseURL: "https://techni-store-default-rtdb.firebaseio.com" };
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();
db.ref('products').on('value', (snapshot) => {
  products = snapshot.val() || {};
  renderProducts();
});

function renderProducts() {
  const grid = document.getElementById('pGrid');
  grid.innerHTML = Object.keys(products).map(id => {
    const p = products[id];
    return `
      <div class="g" style="padding:15px;border-radius:16px;">
        <h3>${p.name}</h3>
        <p>${Number(p.price).toLocaleString()} د.ع</p>
        <button class="bca" style="width:100%;">إضافة للسلة</button>
        ${isAdmin ? `
        <div class="card-actions">
          <button onclick="editProduct('${id}')"><span class="iconify" data-icon="mdi:pencil"></span></button>
          <button onclick="deleteProduct('${id}')"><span class="iconify" data-icon="mdi:trash-can"></span></button>
        </div>` : ''}
      </div>
    `;
  }).join('');
}

function saveProduct() {
  const name = document.getElementById('fN').value;
  const price = document.getElementById('fP').value;
  if(name && price) {
    db.ref('products').push({ name, price });
    showStorePage();
  }
}

function deleteProduct(id) {
  if(confirm('حذف؟')) db.ref('products/' + id).remove();
}

function editProduct(id) {
  const p = products[id];
  document.getElementById('editHid').value = id;
  document.getElementById('fN').value = p.name;
  document.getElementById('fP').value = p.price;
  showAdminPage();
}
</script>
</body>
</html>
