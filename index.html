<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقني ستور</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<style>
    body{background:#030304;color:#fff;font-family:sans-serif;}
    .g{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:15px;padding:15px;}
    .bca{background:#4F46E5;padding:8px;border-radius:8px;width:100%;color:#fff;border:none;cursor:pointer;}
    .card-actions{display:flex;justify-content:center;gap:10px;margin-top:10px;}
    .card-actions button{background:rgba(255,255,255,.1);border:none;padding:8px;border-radius:8px;cursor:pointer;}
</style>
</head>
<body>

<div id="storePg" style="max-width:1200px;margin:20px auto;padding:20px;">
    <button onclick="showAdminPage()" style="background:none;border:1px solid #333;color:#fff;padding:5px 10px;border-radius:5px;cursor:pointer;">⚙️ إعدادات</button>
    <div id="pGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-top:20px;"></div>
</div>

<div id="adminPg" style="display:none;max-width:500px;margin:50px auto;padding:20px;background:#111;border-radius:15px;">
    <h2>لوحة التحكم</h2>
    <input type="text" id="fN" placeholder="الاسم" style="width:100%;margin-bottom:10px;padding:8px;background:#222;border:none;color:#fff;">
    <input type="text" id="fC" placeholder="القسم" style="width:100%;margin-bottom:10px;padding:8px;background:#222;border:none;color:#fff;">
    <input type="number" id="fP" placeholder="السعر" style="width:100%;margin-bottom:10px;padding:8px;background:#222;border:none;color:#fff;">
    <input type="number" id="fS" placeholder="الكمية" style="width:100%;margin-bottom:10px;padding:8px;background:#222;border:none;color:#fff;">
    <input type="text" id="fI" placeholder="رابط الصورة" style="width:100%;margin-bottom:10px;padding:8px;background:#222;border:none;color:#fff;">
    <button onclick="saveProduct()" class="bca">حفظ</button>
    <button onclick="showStorePage()" style="background:none;border:none;color:#999;margin-top:10px;cursor:pointer;">العودة</button>
</div>

<script>
let products = {};
let isAdmin = false;

function showAdminPage() {
    if(!isAdmin) {
        const pass = prompt("كلمة المرور:");
        if(pass === "2211") { isAdmin = true; renderProducts(); document.getElementById('storePg').style.display='none'; document.getElementById('adminPg').style.display='block'; }
        else { alert("خطأ!"); }
    } else { document.getElementById('storePg').style.display='none'; document.getElementById('adminPg').style.display='block'; }
}

function showStorePage() { document.getElementById('adminPg').style.display='none'; document.getElementById('storePg').style.display='block'; }

const db = firebase.database();
db.ref('products').on('value', (snap) => { products = snap.val() || {}; renderProducts(); });

function renderProducts() {
    const grid = document.getElementById('pGrid');
    grid.innerHTML = Object.keys(products).map(id => {
        const p = products[id];
        return `
            <div class="g">
                <img src="${p.img || 'https://via.placeholder.com/150'}" style="width:100%;height:150px;object-fit:cover;border-radius:10px;">
                <h3 style="margin:10px 0;">${p.name}</h3>
                <p>القسم: ${p.category || 'عام'}</p>
                <p>السعر: ${p.price} د.ع | الكمية: ${p.stock || 0}</p>
                <button class="bca">إضافة للسلة</button>
                ${isAdmin ? `
                <div class="card-actions">
                    <button onclick="editProduct('${id}')"><span class="iconify" data-icon="mdi:pencil"></span></button>
                    <button onclick="deleteProduct('${id}')"><span class="iconify" data-icon="mdi:trash-can"></span></button>
                </div>` : ''}
            </div>
        `;
    }).join('');
}

function saveProduct() {
    const name = document.getElementById('fN').value;
    const category = document.getElementById('fC').value;
    const price = document.getElementById('fP').value;
    const stock = document.getElementById('fS').value;
    const img = document.getElementById('fI').value;
    if(name && price) { db.ref('products').push({name, category, price, stock, img}); showStorePage(); }
}

function deleteProduct(id) { if(confirm("حذف؟")) db.ref('products/'+id).remove(); }
</script>
</body>
</html>
