<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تقني ستور</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .product-card { border: 1px solid #333; padding: 15px; border-radius: 10px; margin: 10px; display: inline-block; width: 200px; vertical-align: top; }
        img { width: 100%; height: 120px; object-fit: cover; }
        .admin-only { display: none; }
    </style>
</head>
<body>

    <button onclick="login()">⚙️ إعدادات</button>
    <div id="products-container"></div>

    <script>
        let isAdmin = false;
        const db = firebase.database();

        function login() {
            const pass = prompt("كلمة المرور:");
            if(pass === "2211") {
                isAdmin = true;
                render();
            } else { alert("خطأ!"); }
        }

        db.ref('products').on('value', (snap) => {
            window.products = snap.val() || {};
            render();
        });

        function render() {
            const container = document.getElementById('products-container');
            container.innerHTML = Object.keys(window.products).map(id => {
                const p = window.products[id];
                return `
                    <div class="product-card">
                        <img src="${p.img || 'https://via.placeholder.com/150'}">
                        <h3>${p.name}</h3>
                        <p>السعر: ${p.price}</p>
                        ${isAdmin ? `<button onclick="del('${id}')">🗑️ حذف</button>` : ''}
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
