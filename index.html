*{font-family:'Noto Kufi Arabic',sans-serif;box-sizing:border-box}
body{background:#030304;color:#fff;margin:0}

.bc{background:#fff;color:#000;transition:all .3s;cursor:pointer;border:none}\.bc:hover{box-shadow:0 0 20px rgba(255,255,255,.3);transform:scale(1.03)}

.pc:hover .pi{transform:scale(1.05)}\.pi{transition:transform .5s cubic-bezier(.16,1,.3,1)}
.fi{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:.75rem;padding:10px 16px;font-size:14px;color:#fff;transition:all .3s;width:100%;font-family:inherit}

select.fi{background:#1e1b4b;color:#fff;}
textarea.fi{resize:none}
.cat-btn{padding:8px 16px;border-radius:10px;font-size:12px;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#94a3b8;white-space:nowrap;}
.cat-btn.active{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.5);color:#fff;font-weight:600;}
.card-actions{display:flex;align-items:center;justify-content:center;gap:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.05);margin-top:10px;}
.card-actions button{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:all .2s;background:rgba(255,255,255,.05);color:#94a3b8;}
