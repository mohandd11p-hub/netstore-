<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تقني ستور</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .product-card { border: 1px solid #333; padding: 15px; border-radius: 10px; margin: 10px; display: inline-block; width: 200px; vertical-align: top; }
        img { width: 100%; height: 120px; object-fit: cover; }
    </style>
</head>
<body>

    <button onclick="login()">⚙️ إعدادات</button>
    <div id="products-container"></div>

    <script>
        // تعريف المتغيرات الأساسية
        let isAdmin = false; 
        const firebaseConfig = { databaseURL: "https://techni-store-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // دالة تسجيل الدخول
        function login() {
            const pass = prompt("كلمة المرور:");
            if(pass === "2211") {
                isAdmin = true;
                render(); // إعادة عرض المنتجات لإظهار الأزرار لك
                alert("تم تسجيل الدخول!");
            } else { alert("كلمة المرور خاطئة"); }
        }

        // جلب المنتجات
        db.ref('products').on('value', (snap) => {
            window.products = snap.val() || {};
            render();
        });

        // دالة عرض المنتجات (هنا السر في إخفاء الأزرار)
        function render() {
            const container = document.getElementById('products-container');
            container.innerHTML = Object.keys(window.products || {}).map(id => {
                const p = window.products[id];
                return `
                    <div class="product-card">
                        <img src="${p.img || 'https://via.placeholder.com/150'}">
                        <h3>${p.name || 'منتج'}</h3>
                        <p>السعر: ${p.price || 0}</p>
                        ${isAdmin ? `<button onclick="del('${id}')">🗑️ حذف</button>` : ''}
                    </div>
                `;
            }).join('');
        }
        
        function del(id) {
            if(confirm("هل تريد الحذف؟")) db.ref('products/'+id).remove();
        }
    </script>
</body>
</html>
